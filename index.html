<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISKE Through the Years · 2007–2025</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* Slide area */
  #stage {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 60px 10px;
    opacity: 0;
    transition: opacity 0.7s ease;
    pointer-events: none;
  }
  .slide.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* Photo grid */
  .photo-grid {
    display: flex;
    gap: 10px;
    width: 100%;
    flex: 1;
    min-height: 0;
    align-items: center;
    justify-content: center;
  }
  .photo-grid .photo-wrap {
    flex: 1;
    max-width: 48%;
    min-height: 0;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .photo-grid.three .photo-wrap {
    max-width: 32%;
  }
  .photo-grid.one .photo-wrap {
    max-width: 70%;
  }
  .photo-wrap img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    display: block;
  }

  /* Caption */
  .caption {
    text-align: center;
    margin-top: 14px;
    flex-shrink: 0;
  }
  .caption .year {
    font-size: 3.8rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: #fff;
    line-height: 1;
  }
  .caption .location {
    font-size: 1.6rem;
    font-weight: 300;
    letter-spacing: 0.18em;
    color: #aaa;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* Nav arrows */
  .nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.08);
    border: none;
    color: #fff;
    font-size: 1.6rem;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    z-index: 20;
  }
  .nav:hover { background: rgba(255,255,255,0.2); }
  #prev { left: 10px; }
  #next { right: 10px; }

  /* Bottom bar */
  #footer {
    padding: 10px 20px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(to top, #0a0a0a, transparent);
  }
  #counter {
    font-size: 0.75rem;
    color: #666;
    white-space: nowrap;
    min-width: 56px;
  }
  #progress-bar {
    flex: 1;
    height: 2px;
    background: #222;
    border-radius: 2px;
    overflow: hidden;
  }
  #progress-fill {
    height: 100%;
    background: #fff;
    border-radius: 2px;
    transition: width 0.3s ease;
  }
  #play-btn {
    background: none;
    border: 1px solid #444;
    color: #aaa;
    font-size: 0.7rem;
    padding: 4px 10px;
    border-radius: 20px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s;
  }
  #play-btn:hover { border-color: #888; color: #fff; }

  #timer-bar {
    height: 2px;
    background: rgba(255,255,255,0.15);
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
  }
  #timer-fill {
    height: 100%;
    background: rgba(255,255,255,0.5);
    width: 0%;
  }

  /* 2026 ongoing slide */
  .slide.ongoing { border: 2px solid rgba(255,200,0,0.25); }
  .slide.ongoing .caption .year { color: #ffd700; }
  .slide.ongoing .caption .location { color: #ffec7a; }
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(255, 60, 60, 0.15);
    border: 1px solid rgba(255,80,80,0.5);
    border-radius: 20px;
    padding: 5px 14px;
    margin-top: 10px;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: #ff6b6b;
    text-transform: uppercase;
  }
  .live-dot {
    width: 8px; height: 8px;
    background: #ff4444;
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* Mobile */
  @media (max-width: 600px) {
    body { height: 100dvh; }

    .slide { padding: 8px 48px 6px; }

    /* 3-photo grid: 2 on top, 1 below */
    .photo-grid.three {
      flex-wrap: wrap;
      align-content: center;
    }
    .photo-grid.three .photo-wrap {
      max-width: 48%;
      height: 45%;
    }
    .photo-grid.three .photo-wrap:last-child {
      max-width: 60%;
      height: 40%;
    }
    .photo-grid.one .photo-wrap { max-width: 90%; }

    .caption { margin-top: 8px; }
    .caption .year  { font-size: 2.2rem; }
    .caption .location { font-size: 1rem; letter-spacing: 0.12em; margin-top: 3px; }
    .live-badge { font-size: 0.7rem; padding: 4px 10px; margin-top: 6px; }

    .nav { width: 36px; height: 36px; font-size: 1.3rem; }
    #prev { left: 6px; }
    #next { right: 6px; }

    #footer { padding: 6px 14px 10px; gap: 8px; }
    #counter { font-size: 0.7rem; min-width: 44px; }
    #play-btn { font-size: 0.65rem; padding: 4px 8px; }
  }

  /* Landscape phone */
  @media (max-width: 900px) and (orientation: landscape) {
    .slide { padding: 6px 52px 4px; }
    .caption { margin-top: 4px; }
    .caption .year { font-size: 1.8rem; }
    .caption .location { font-size: 0.85rem; margin-top: 2px; }
    .live-badge { font-size: 0.65rem; padding: 3px 8px; margin-top: 4px; }
    #footer { padding: 4px 14px 6px; }
  }
</style>
</head>

</div>

<div id="footer">

const TOTAL = slides.length;
const INTERVAL = 5000;
let current = 0;
let playing = true;
let timer = null;
let timerAnim = null;
let timerStart = null;

const stage = document.getElementById('stage');
const counter = document.getElementById('counter');
const progressFill = document.getElementById('progress-fill');
const playBtn = document.getElementById('play-btn');
const timerFill = document.getElementById('timer-fill');

// Build slide elements
const slideEls = slides.map((data, i) => {
  const div = document.createElement('div');
  div.className = 'slide' + (data.ongoing ? ' ongoing' : '');

  const n = data.photos.length;
  const grid = document.createElement('div');
  grid.className = 'photo-grid' + (n === 1 ? ' one' : n === 3 ? ' three' : '');

  data.photos.forEach(p => {
    const wrap = document.createElement('div');
    wrap.className = 'photo-wrap';
    const img = document.createElement('img');
    img.src = data.ongoing ? p : BASE + p;
    img.alt = data.year + ' ' + data.location;
    img.loading = i < 3 ? 'eager' : 'lazy';
    wrap.appendChild(img);
    grid.appendChild(wrap);
  });

  const caption = document.createElement('div');
  caption.className = 'caption';
  const badge = data.ongoing
    ? `<div class="live-badge"><span class="live-dot"></span>Conference Ongoing</div>`
    : '';
  caption.innerHTML = `<div class="year">${data.year}</div><div class="location">${data.location}</div>${badge}`;

  div.appendChild(grid);
  div.appendChild(caption);
  stage.appendChild(div);
  return div;
});

function goTo(n) {
  slideEls[current].classList.remove('active');
  current = (n + TOTAL) % TOTAL;
  slideEls[current].classList.add('active');
  counter.textContent = (current + 1) + ' / ' + TOTAL;
  progressFill.style.width = ((current + 1) / TOTAL * 100) + '%';
  resetTimer();
}

function resetTimer() {
  cancelAnimationFrame(timerAnim);
  timerFill.style.width = '0%';
  if (!playing) return;
  timerStart = performance.now();
  function tick(now) {
    const elapsed = now - timerStart;
    const pct = Math.min(elapsed / INTERVAL * 100, 100);
    timerFill.style.width = pct + '%';
    if (elapsed < INTERVAL) {
      timerAnim = requestAnimationFrame(tick);
    } else {
      goTo(current + 1);
    }
  }
  timerAnim = requestAnimationFrame(tick);
}

const bgm = document.getElementById('bgm');

function togglePlay() {
  playing = !playing;
  playBtn.textContent = playing ? 'PAUSE' : 'PLAY';
  if (playing) { resetTimer(); bgm.play(); }
  else { cancelAnimationFrame(timerAnim); timerFill.style.width = '0%'; bgm.pause(); }
}

document.getElementById('prev').onclick = () => goTo(current - 1);
document.getElementById('next').onclick = () => goTo(current + 1);
playBtn.onclick = togglePlay;

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  goTo(current - 1);
  if (e.key === 'ArrowRight') goTo(current + 1);
  if (e.key === ' ') { e.preventDefault(); togglePlay(); }
});

// Touch swipe
let touchX = null;
stage.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
stage.addEventListener('touchend', e => {
  if (touchX === null) return;
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 40) dx < 0 ? goTo(current + 1) : goTo(current - 1);
  touchX = null;
}, { passive: true });

// Start audio on first user interaction (browser autoplay policy)
document.addEventListener('click', function startAudio() {
  if (playing) bgm.play();
  document.removeEventListener('click', startAudio);
}, { once: true });
document.addEventListener('touchend', function startAudioTouch() {
  if (playing) bgm.play();
  document.removeEventListener('touchend', startAudioTouch);
}, { once: true });

// Init
goTo(0);
